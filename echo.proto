
syntax = "proto3";

package echo;

service EchoService {
  // unary call
  rpc Echo(EchoRequest) returns (EchoReply);

  // server streaming call
  rpc EchoStream(EchoRequestStream) returns (stream EchoReply);
}

message EchoRequest {
  string payload = 1;
}

message EchoRequestStream {
  string payload = 1;
  int64 count = 2;
}

message EchoReply {
  EchoRequest request = 1;
}
